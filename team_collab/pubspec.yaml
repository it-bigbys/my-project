name: team_collab
description: A team collaboration web application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^13.0.0
  table_calendar: ^3.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.10
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  url_launcher: ^6.2.5
  encrypt: ^5.0.3
  fl_chart: ^0.70.2
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  http: ^1.2.1
  path_provider: ^2.1.2
  path: ^1.9.0
  universal_html: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - images/logo.png
